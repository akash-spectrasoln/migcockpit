[pytest]
# Pytest configuration for SQL compilation tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require mocks)
    slow: Slow running tests
    db: Tests that require database connection

# Coverage options (if pytest-cov is installed)
# addopts = --cov=api --cov-report=html --cov-report=term-missing

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Django settings (if using pytest-django)
DJANGO_SETTINGS_MODULE = datamigrationapi.settings
